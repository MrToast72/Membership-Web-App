<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aspen Membership Verifier{% endblock %}</title>
    <link rel="icon" href="/static/assets/app_icon_32.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .scan-input { font-size: 1.5rem; padding: 1rem; }
        .member-card { max-width: 600px; margin: 2rem auto; }
        .verified { border-left: 5px solid #28a745; }
        .not-found { border-left: 5px solid #dc3545; }
        .multiple { border-left: 5px solid #ffc107; }
        .members-scroll { max-height: 600px; overflow-y: auto; overflow-x: visible; }
        .members-card { max-width: 1200px; margin-left: auto; margin-right: auto; }
        @media (max-width: 1549.98px) {
            .members-scroll { overflow-x: auto; }
        }
        @media (min-width: 1550px) {
            .members-scroll {
                overflow-x: visible;
            }
            .members-scroll table {
                width: 100%;
                min-width: 0;
                table-layout: auto;
            }
        }
        @media (max-width: 767.98px) {
            .members-scroll { max-height: none; }
            .admin-stack-gap > * + * { margin-top: 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <img src="/static/assets/app_icon_32.png" alt="Aspen" width="28" height="28">
                <span>Aspen Membership Verifier</span>
            </a>
            <div class="navbar-nav ms-auto d-flex flex-row gap-2 align-items-center">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/admin">Admin Panel</a>
            </div>
        </div>
    </nav>
    <div class="{% block container_class %}container mt-4{% endblock %}">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
